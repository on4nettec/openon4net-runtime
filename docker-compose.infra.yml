# Optional — only for developers who don't already have postgres/redis/minio
# running. docker-compose.yml (gateway+web) treats that infra as external and
# doesn't start it; this file exists purely to make a fresh clone usable.
#
# Ports/credentials match .env.example's defaults exactly, so a first-time
# setup (`cp .env.example .env`) needs zero edits to talk to this stack.
#
#   docker compose -f docker-compose.infra.yml up -d
#
# Once you have your own postgres/redis/minio (shared across projects, a
# managed instance, whatever), stop using this file and just point .env at
# those instead — see README.md.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: o2n
      POSTGRES_USER: o2n
      POSTGRES_PASSWORD: o2n_dev_password
    ports:
      - '5532:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U o2n -d o2n']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6479:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: o2n_minio
      MINIO_ROOT_PASSWORD: o2n_minio_password
    ports:
      - '9500:9000'
      - '9501:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
