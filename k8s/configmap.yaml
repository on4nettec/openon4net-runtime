# Non-secret env only — see secret.yaml.example for DATABASE_URL/REDIS_URL/
# JWT_SECRET/CONFIG_ENCRYPTION_KEY/etc, which must never live in a ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: o2n-gateway-config
  namespace: o2n-runtime
data:
  PORT: '4000'
  NODE_ENV: 'production'
  DB_AUTO_MIGRATE: 'true'
  AUTH_METHODS_ENABLED: 'password'
  RATE_LIMIT_PER_MINUTE: '100'
  # Point these at your actual cluster-internal LLM provider / callback URLs
  # before applying — these are placeholders, not defaults meant to work
  # as-is.
  LLM_PROVIDER: 'anthropic'
  LLM_MODEL: 'claude-sonnet-5'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: o2n-web-config
  namespace: o2n-runtime
data:
  # Must resolve from the browser, not just inside the cluster — point this
  # at the Ingress host, not the gateway Service's cluster-internal DNS name.
  NEXT_PUBLIC_API_URL: 'https://api.example.com'
