name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    # Discovered 2026-07-18: this job's "Lint, typecheck, test" step has been
    # failing since 2026-07-12 (every push since) with ECONNREFUSED on
    # 127.0.0.1:5432/6379 — @o2n/gateway's vitest suite hits a real Postgres/
    # Redis (test-support/db.ts, redis.ts), and this workflow never provided
    # either. MinIO-gated tests (object-storage.test.ts, backup-service.ts's
    # real-MinIO describe block) stay skipped in CI on purpose — they check
    # `describeIfMinio`/`minioAvailable` and gracefully no-op when
    # MINIO_ENDPOINT is unset, same as pg_dump/pg_restore-gated backup tests
    # skip when those binaries aren't on the runner's PATH.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: o2n
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/o2n
      REDIS_URL: redis://localhost:6379
    steps:
      # This repo (openon4net-runtime) is nested as apps/openon4net-runtime inside the
      # parent openon4net monorepo, which owns pnpm-workspace.yaml, turbo.json,
      # tsconfig.base.json, and packages/* (shared/governance/llm-providers) that
      # gateway/web depend on. GitHub Actions triggers per-repository, so a workflow
      # here never sees a push to the parent — we reconstruct the parent tree
      # ourselves: checkout the parent superproject, then overlay *this* commit
      # (the one that actually triggered this run) into apps/openon4net-runtime,
      # overwriting whatever stale submodule pointer the parent currently has.
      - name: Checkout parent monorepo (packages/, tooling)
        uses: actions/checkout@v4
        with:
          repository: on4nettec/openon4net
          path: parent
          submodules: false

      - name: Overlay this commit into apps/openon4net-runtime
        uses: actions/checkout@v4
        with:
          path: parent/apps/openon4net-runtime

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: parent/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: parent
        run: pnpm install --frozen-lockfile

      # Two separate invocations, not one `turbo run lint typecheck test build`.
      # Three times now (2026-07-10: EmbeddingProvider, UserCreateSchema,
      # WorkspaceCreateSchema), a new packages/* export consumed by
      # @o2n/gateway in the same commit made this CI job fail with "no
      # exported member", while a byte-identical clean clone always built
      # 20/20 locally and a bare retrigger always went green with zero code
      # changes - consistent with a turbo task-scheduling race under this
      # runner's limited concurrency (typecheck/lint/test all declare
      # dependsOn: ["^build"], but that's turbo's own scheduling guarantee,
      # not an OS-level file-flush guarantee). Running build to full process
      # exit first removes any ambiguity: every dist/ is on disk before
      # typecheck/lint/test can start.
      - name: Build (all packages, full dependency graph)
        working-directory: parent
        run: pnpm turbo run build

      # Schema must exist before the test step's vitest suites run (they
      # assume it, same as any local dev run of the gateway with
      # DB_AUTO_MIGRATE on). Calling scripts/migrate.mjs directly (not via
      # `pnpm run migrate`) since that npm script's `--env-file=../.env`
      # requires a dotenv file this checkout doesn't have — the script
      # itself just reads process.env.DATABASE_URL, already set above.
      - name: Run database migrations
        working-directory: parent/apps/openon4net-runtime/gateway
        run: node scripts/migrate.mjs

      # A handful of gateway test files deterministically got
      # test-support/db.ts's hardcoded fallback DB credentials instead of
      # the DATABASE_URL set above, until turbo.json (root repo) declared
      # DATABASE_URL/REDIS_URL as `env` for the "test" task — turbo only
      # guarantees an env var reaches a task's child process when declared
      # there, regardless of what's set at the job/step level in this
      # workflow. Restated here too as harmless defense-in-depth.
      - name: Lint, typecheck, test
        working-directory: parent
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/o2n
          REDIS_URL: redis://localhost:6379
        run: pnpm turbo run lint typecheck test
